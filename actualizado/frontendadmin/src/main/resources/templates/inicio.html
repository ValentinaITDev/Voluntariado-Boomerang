<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impulsa el Cambio - Inicio</title>
    <link rel="stylesheet" type="text/css" href="/Inicio.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Limelight&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Luckiest+Guy&family=Lusitana:wght@400;700&family=Mitr:wght@200;300;400;500;600;700&family=Glass+Antiqua&family=Monomakh&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <img src="/Imagenes/Logo.png" alt="Logo" class="Logo" />
      </div>
      <nav class="navbar">
        <ul>
          <li>
            <a href="/Inicio"
              ><i class="fa-solid fa-house" style="color: #1c5b99"></i>
              Inicio</a
            >
          </li>
          <li>
            <a href="/inicioSesion"
              ><i
                class="fa-solid fa-right-to-bracket"
                style="color: #1c5b99"
              ></i>
              Inicio Sesión</a
            >
          </li>
          <li>
            <a href="/Registrarse"
              ><i class="fa-solid fa-user-plus" style="color: #1c5b99"></i>
              Registrarse</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="IMPULSA-EL-CAMBIO" data-text="IMPULSA EL CAMBIO">
        IMPULSA EL CAMBIO
      </h1>

      <div class="image-circle-container">
        <div class="image-item">
          <img
            src="/Imagenes/Inicio1.jpg"
            alt="Imagen Voluntariado"
            class="circle-image"
          />
          <h2 class="image-title">Juntos hacemos el cambio</h2>
        </div>
        <div class="image-item">
          <img
            src="/Imagenes/Inicio2.jpg"
            alt="Imagen Voluntariado"
            class="circle-image"
          />
          <h2 class="image-title">Pequeñas acciones, grandes cambios</h2>
        </div>
        <div class="image-item">
          <img
            src="/Imagenes/Inicio3.jpg"
            alt="Imagen Voluntariado"
            class="circle-image"
          />
          <h2 class="image-title">Tu tiempo, su esperanza</h2>
        </div>
      </div>

      <section class="Botonvoluntario">
        <div class="boton">
          <a href="/Registrarse" class="QUIERO-SER-VOLUNTARIO"
            >QUIERO SER VOLUNTARIO</a
          >
        </div>
      </section>
    </main>
  </body>
</html>
